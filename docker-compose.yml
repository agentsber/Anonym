version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: anonym_x_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=anonym_x
    networks:
      - anonym_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anonym_x_backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=anonym_x
    depends_on:
      - mongodb
    networks:
      - anonym_network

  # Nginx Reverse Proxy (optional, for production with SSL)
  nginx:
    image: nginx:alpine
    container_name: anonym_x_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - anonym_network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local

networks:
  anonym_network:
    driver: bridge
