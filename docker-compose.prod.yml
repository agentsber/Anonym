# Anonym X - Production Docker Compose
# Use: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: anonym_x_db
    restart: always
    volumes:
      - mongodb_data:/data/db
      - ./backups:/backups
    environment:
      - MONGO_INITDB_DATABASE=anonym_x
    networks:
      - anonym_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/anonym_x --quiet
      interval: 30s
      timeout: 10s
      retries: 3
    # Security: Don't expose MongoDB port externally in production
    # ports:
    #   - "27017:27017"

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anonym_x_backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=anonym_x
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
      - ./logs:/var/log/app
    networks:
      - anonym_network
    healthcheck:
      test: curl -f http://localhost:8001/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: anonym_x_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/www:/var/www/certbot:ro
      - ./admin:/usr/share/nginx/html/admin:ro
    depends_on:
      - backend
    networks:
      - anonym_network

volumes:
  mongodb_data:
    driver: local

networks:
  anonym_network:
    driver: bridge
